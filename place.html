<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="WDD 131 Dynamic Web Fundamentals personal profile page with course information and projects.">
    <meta name="author" content="Chrisman Asamoah">

    <title>Visit Ghana</title>
    <link rel="stylesheet" href="styles/place.css">
    <script src="scripts/place.js" defer></script>
</head>
<body>

<header>
    <h1>Visit Ghana</h1>
</header>

<!-- HERO SECTION -->
<section class="hero">
    <picture>
        <source srcset="images/ghana-building.webp" media="(min-width: 768px)">
        <img src="images/ghana-building.webp" alt="Beautiful Ghana">
    </picture>
</section>

<!-- MAIN CONTENT -->
<main>
    <section class="info">
        <h2>About Ghana</h2>
        <p>Ghana is a vibrant country in West Africa known for culture, history, and hospitality.</p>
    </section>

    <!-- WEATHER -->
    <section class="weather">
        <h2>Weather</h2>
        <p>Temperature: <span id="temp">8</span>°C</p>
        <p>Wind Speed: <span id="wind">10</span> km/h</p>
        <p>Wind Chill: <span id="windChill"></span></p>
    </section>
</main>

<footer>
    <p>&copy; <span id="year"></span></p>
    <p>Last Modified: <span id="lastModified"></span></p>
</footer>

</body>
</html>
