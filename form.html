<!DOCTYPE html>
<html lang="en-US">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product Review Form</title>

<meta name="description" content="Submit a product review including rating, features, and feedback for selected products.">
<meta name="author" content="Chrisman Asamoah">

<link rel="stylesheet" href="styles/form.css">
<script src="scripts/form.js" defer></script>
</head>

<body>

<header>
    <h1>Product Review Form</h1>
</header>

<main>
<form method="get" action="review.html">

<!-- Product -->
<label for="product">Product Name</label>
<select id="product" name="product" required>
    <option value="" disabled selected>Select a Product ...</option>
</select>

<!-- Rating -->
<fieldset>
<legend>Overall Rating</legend>

<input type="radio" id="r1" name="rating" value="1" required>
<label for="r1">☆</label>

<input type="radio" id="r2" name="rating" value="2" required>
<label for="r2">☆☆</label>

<input type="radio" id="r3" name="rating" value="3" required>
<label for="r3">☆☆☆</label>

<input type="radio" id="r4" name="rating" value="4" required>
<label for="r4">☆☆☆☆</label>

<input type="radio" id="r5" name="rating" value="5" required>
<label for="r5">☆☆☆☆☆</label>

</fieldset>

<!-- Date -->
<label for="date">Date of Installation</label>
<input type="date" id="date" name="date" required>

<!-- Features -->
<fieldset>
<legend>Useful Features</legend>

<input type="checkbox" id="f1" name="features" value="durable">
<label for="f1">Durable</label>

<input type="checkbox" id="f2" name="features" value="easy">
<label for="f2">Easy to Use</label>

<input type="checkbox" id="f3" name="features" value="fast">
<label for="f3">Fast</label>

<input type="checkbox" id="f4" name="features" value="design">
<label for="f4">Good Design</label>

</fieldset>

<!-- Review -->
<label for="review">Written Review</label>
<textarea id="review" name="review"></textarea>

<!-- Username -->
<label for="username">Your Name</label>
<input type="text" id="username" name="username">

<!-- Submit -->
<input type="submit" value="Submit Review">

</form>
</main>

<footer>
    <p>© 2026 Chrisman Asamoah | WDD 131</p>
</footer>

</body>
</html>
